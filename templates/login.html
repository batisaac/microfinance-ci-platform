<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COFINANCE CI — Connexion</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231E3A8A'/><text x='16' y='22' font-size='18' font-weight='bold' fill='white' text-anchor='middle'>C</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: linear-gradient(135deg, #1E3A8A 0%, #2563EB 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .login-card {
      background: #fff;
      border-radius: 24px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
    }
    .login-card .brand { text-align: center; margin-bottom: 2rem; }
    .login-card .brand h2 { font-weight: 800; color: #1E3A8A; font-size: 1.75rem; margin: 0; }
    .login-card .brand p { color: #64748B; font-size: .85rem; margin: .25rem 0 0; }
    .login-card .form-label { font-weight: 600; color: #334155; font-size: .8rem; }
    .login-card .form-control {
      border-radius: 12px; padding: .7rem 1rem;
      border: 2px solid #E2E8F0; font-size: .9rem; transition: all .2s;
    }
    .login-card .form-control:focus {
      border-color: #2563EB; box-shadow: 0 0 0 3px rgba(37,99,235,.15);
    }
    .login-card .btn-login {
      background: #1E3A8A; color: #fff; border: none;
      border-radius: 12px; padding: .75rem; font-weight: 700;
      font-size: .95rem; width: 100%; transition: all .2s;
    }
    .login-card .btn-login:hover { background: #2563EB; transform: translateY(-1px); }
    .login-card .btn-login:disabled { opacity: .6; }
    .login-card .alert { border-radius: 12px; font-size: .85rem; }
    .login-card .demo-creds {
      margin-top: 1.5rem; padding: 1rem;
      background: #F8FAFC; border-radius: 12px; font-size: .75rem; color: #64748B;
    }
    .login-card .demo-creds code { display: block; font-size: .75rem; margin-top: .25rem; }
    .spinner-border-sm-custom { width: 1.2rem; height: 1.2rem; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">
      <h2>COFINANCE CI</h2>
      <p>Plateforme de gestion digitale</p>
    </div>
    <div id="login-alert" style="display:none"></div>
    <form id="login-form" onsubmit="return handleLogin(event)">
      <div class="mb-3">
        <label class="form-label">Adresse email</label>
        <input type="email" class="form-control" id="email" placeholder="exemple@cofinance.ci" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label">Mot de passe</label>
        <input type="password" class="form-control" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login" id="login-btn">
        <span id="login-text">Se connecter</span>
        <span id="login-spinner" style="display:none"><span class="spinner-border spinner-border-sm" role="status"></span> Connexion...</span>
      </button>
    </form>
    <div class="demo-creds">
      <strong>Identifiants de démonstration :</strong>
      <code>Admin : admin@cofinance.ci / admin123</code>
      <code>Agent : agent1@cofinance.ci / agent123</code>
      <code>Client : client1@cofinance.ci / client123</code>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const text = document.getElementById('login-text');
      const spinner = document.getElementById('login-spinner');
      const alert = document.getElementById('login-alert');
      btn.disabled = true; text.style.display = 'none'; spinner.style.display = '';
      alert.style.display = 'none';
      try {
        const res = await fetch('/api/v1/auth/login/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('access_token', data.access);
          localStorage.setItem('refresh_token', data.refresh);
          const profile = await fetch('/api/v1/auth/profile/', {
            headers: { 'Authorization': `Bearer ${data.access}` }
          });
          if (profile.ok) {
            const user = await profile.json();
            localStorage.setItem('user_data', JSON.stringify(user));
          }
          window.location.href = '/dashboard/';
        } else {
          alert.className = 'alert alert-danger';
          alert.textContent = data.detail || 'Email ou mot de passe incorrect.';
          alert.style.display = '';
          btn.disabled = false; text.style.display = ''; spinner.style.display = 'none';
        }
      } catch(e) {
        alert.className = 'alert alert-danger';
        alert.textContent = 'Erreur de connexion au serveur.';
        alert.style.display = '';
        btn.disabled = false; text.style.display = ''; spinner.style.display = 'none';
      }
    }
    if (localStorage.getItem('access_token')) { window.location.href = '/dashboard/'; }
  </script>
</body>
</html>
